name: "ML CI/CD — Build, Test & Push to ECR"

# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • PR  → dev : lint + unit tests + post comment (no image push)
#   • push→ dev : lint + unit tests → build & push all 3 images to ECR
# ─────────────────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches:
      - dev
    paths:
      - "src/**"
      - "tests/**"
      - "Dockerfile.*"
      - "requirements*.txt"
      - "pyproject.toml"
      - "setup.py"
  push:
    branches:
      - dev
    paths:
      - "src/**"
      - "Dockerfile.*"
      - "requirements*.txt"

permissions:
  id-token: write      # OIDC → AWS
  contents: read
  pull-requests: write

env:
  AWS_REGION:     "ap-southeast-1"
  PYTHON_VERSION: "3.11"
  TF_VERSION:     "2.16.1"   # pin TensorFlow version

  # ── Set these in GitHub → Settings → Secrets and variables → Variables ──
  # After `terraform apply`, copy from `terraform output`
  ECR_REGISTRY:         ${{ vars.ECR_REGISTRY }}          # 123456789.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPO_PREPROCESSING: ${{ vars.ECR_REPO_PREPROCESSING }}  # dev/mlops-preprocessing
  ECR_REPO_TRAINING:    ${{ vars.ECR_REPO_TRAINING }}     # dev/mlops-training
  ECR_REPO_SERVING:     ${{ vars.ECR_REPO_SERVING }}      # dev/mlops-serving

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  JOB 1 — Lint, unit tests, coverage                                     │
  # │  Runs on: PR and push                                                   │
  # └─────────────────────────────────────────────────────────────────────────┘
  test:
    name: "Lint & Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install TensorFlow CPU-only for testing (much faster in CI)
          pip install tensorflow-cpu==${{ env.TF_VERSION }}
          pip install -r requirements.txt
          pip install -r requirements-dev.txt   # pytest, ruff, coverage, etc.

      - name: Lint with ruff
        id: lint
        run: ruff check src/ tests/ --output-format=github
        continue-on-error: true

      - name: Run unit tests — preprocessing
        id: test-preprocessing
        run: |
          pytest tests/unit/preprocessing \
            --tb=short \
            --junitxml=reports/junit-preprocessing.xml \
            --cov=src/preprocessing \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage-preprocessing.xml \
            -v 2>&1 | tee reports/test-preprocessing.txt
        continue-on-error: true

      - name: Run unit tests — training
        id: test-training
        run: |
          pytest tests/unit/training \
            --tb=short \
            --junitxml=reports/junit-training.xml \
            --cov=src/training \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage-training.xml \
            -v 2>&1 | tee reports/test-training.txt
        continue-on-error: true

      - name: Run unit tests — serving
        id: test-serving
        run: |
          pytest tests/unit/serving \
            --tb=short \
            --junitxml=reports/junit-serving.xml \
            --cov=src/serving \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage-serving.xml \
            -v 2>&1 | tee reports/test-serving.txt
        continue-on-error: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.sha }}
          path: reports/
          retention-days: 14

      - name: Post test summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const readReport = (path) => {
              try { return fs.readFileSync(path, 'utf8'); }
              catch { return 'No output captured.'; }
            };

            const truncate = (s, n = 8000) =>
              s.length > n ? s.substring(0, n) + '\n...(truncated)' : s;

            const preOut    = truncate(readReport('reports/test-preprocessing.txt'));
            const trainOut  = truncate(readReport('reports/test-training.txt'));
            const servingOut = truncate(readReport('reports/test-serving.txt'));

            const body = `## 🤖 ML CI — Test Results

            | Component     | Lint | Tests |
            |---------------|------|-------|
            | Preprocessing | \`${{ steps.lint.outcome }}\` | \`${{ steps.test-preprocessing.outcome }}\` |
            | Training      | \`${{ steps.lint.outcome }}\` | \`${{ steps.test-training.outcome }}\` |
            | Serving       | \`${{ steps.lint.outcome }}\` | \`${{ steps.test-serving.outcome }}\` |

            <details><summary>Preprocessing test output</summary>

            \`\`\`
            ${preOut}
            \`\`\`
            </details>

            <details><summary>Training test output</summary>

            \`\`\`
            ${trainOut}
            \`\`\`
            </details>

            <details><summary>Serving test output</summary>

            \`\`\`
            ${servingOut}
            \`\`\`
            </details>

            ---
            > ℹ️ Images are **not** pushed on PRs — merge to \`dev\` to trigger ECR push.

            *Commit: \`${{ github.sha }}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('ML CI — Test Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if any tests failed
        if: |
          steps.test-preprocessing.outcome == 'failure' ||
          steps.test-training.outcome == 'failure' ||
          steps.test-serving.outcome == 'failure'
        run: |
          echo "One or more test suites failed — see reports above."
          exit 1

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  JOB 2 — Build & push all 3 Docker images to ECR                       │
  # │  Runs on: push to dev ONLY (after tests pass)                           │
  # └─────────────────────────────────────────────────────────────────────────┘
  build-and-push:
    name: "Build & Push to ECR"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    outputs:
      image_tag:            ${{ steps.meta.outputs.tag }}
      preprocessing_image:  ${{ steps.meta.outputs.preprocessing_image }}
      training_image:       ${{ steps.meta.outputs.training_image }}
      serving_image:        ${{ steps.meta.outputs.serving_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tags
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="dev-${SHORT_SHA}"

          PREPROCESSING_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_PREPROCESSING }}:${TAG}"
          TRAINING_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_TRAINING }}:${TAG}"
          SERVING_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_SERVING }}:${TAG}"

          echo "tag=${TAG}"                               >> $GITHUB_OUTPUT
          echo "preprocessing_image=${PREPROCESSING_IMAGE}" >> $GITHUB_OUTPUT
          echo "training_image=${TRAINING_IMAGE}"         >> $GITHUB_OUTPUT
          echo "serving_image=${SERVING_IMAGE}"           >> $GITHUB_OUTPUT

          echo "Tag:           ${TAG}"
          echo "Preprocessing: ${PREPROCESSING_IMAGE}"
          echo "Training:      ${TRAINING_IMAGE}"
          echo "Serving:       ${SERVING_IMAGE}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Preprocessing image ─────────────────────────────────────────────
      - name: Build & push — Preprocessing
        id: build-preprocessing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.preprocessing
          push: true
          tags: |
            ${{ steps.meta.outputs.preprocessing_image }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_PREPROCESSING }}:latest
          cache-from: type=gha,scope=preprocessing
          cache-to: type=gha,mode=max,scope=preprocessing
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            BUILD_SHA=${{ github.sha }}

      # ── Training image (TensorFlow GPU base) ────────────────────────────
      - name: Build & push — Training
        id: build-training
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.training
          push: true
          tags: |
            ${{ steps.meta.outputs.training_image }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_TRAINING }}:latest
          cache-from: type=gha,scope=training
          cache-to: type=gha,mode=max,scope=training
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            TF_VERSION=${{ env.TF_VERSION }}
            BUILD_SHA=${{ github.sha }}

      # ── Serving image (TensorFlow Serving) ──────────────────────────────
      - name: Build & push — Serving
        id: build-serving
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.serving
          push: true
          tags: |
            ${{ steps.meta.outputs.serving_image }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_SERVING }}:latest
          cache-from: type=gha,scope=serving
          cache-to: type=gha,mode=max,scope=serving
          build-args: |
            TF_VERSION=${{ env.TF_VERSION }}
            BUILD_SHA=${{ github.sha }}

      - name: Post build summary
        if: always()
        run: |
          echo "## ML Docker Build — dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image         | Tag | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---------------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Preprocessing | \`${{ steps.meta.outputs.tag }}\` | \`${{ steps.build-preprocessing.outcome }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Training      | \`${{ steps.meta.outputs.tag }}\` | \`${{ steps.build-training.outcome }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Serving       | \`${{ steps.meta.outputs.tag }}\` | \`${{ steps.build-serving.outcome }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pushed Image URLs" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.meta.outputs.preprocessing_image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.meta.outputs.training_image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.meta.outputs.serving_image }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `ML Build/Push FAILED on dev — ${sha}`,
              body: `## ML CI Build Failed\n\n**Branch:** \`dev\`\n**Commit:** \`${context.sha}\`\n**Triggered by:** \`${context.actor}\`\n\n[🔗 View failed run](${runUrl})\n\n> Docker build or ECR push failed. Check logs for details.`,
              labels: ["ml", "docker", "bug"],
            });
