# pytest.ini — Cấu hình pytest cho dự án
[pytest]
testpaths    = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit:        Unit tests (nhanh, không cần external services)
    integration: Integration tests (cần MinIO, MLflow)
    slow:        Tests chạy lâu (>30s)
    gpu:         Tests cần GPU

# Default options
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Timeout mặc định
timeout = 60

# Coverage
[tool:pytest]
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
